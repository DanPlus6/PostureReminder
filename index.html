<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="./assets/css/styles.css">
	<link href="https://googleapis.com" rel="stylesheet">
	
	<title>LockIn</title>
</head>
<body>
	<header>
		<img src="./assets/img/icon_off.png" id="logo"/>
		<h1>Lock In</h1>
	</header>

  <main>
		<div class="side-panel">
			<label class="switch">
				<input type="checkbox" id="toggle">
				<span class="switch-slider"></span>
			</label>

			<nav class="nav-list">
				<button type="button" class="nav-button" data-tab="time">
					<span class="nav-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<circle cx="12" cy="12" r="9"></circle>
							<path d="M12 7v5l3 2"></path>
						</svg>
					</span>
					<span class="nav-label">Time</span>
				</button>

				<button type="button" class="nav-button active" data-tab="images">
					<span class="nav-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<rect x="3" y="4" width="18" height="16" rx="2"></rect>
							<circle cx="8.5" cy="10" r="1.5"></circle>
							<path d="M3 17l5.5-5.5a2 2 0 0 1 2.8 0L17 17"></path>
							<path d="M13 15l2.2-2.2a2 2 0 0 1 2.8 0L21 15.6"></path>
						</svg>
					</span>
					<span class="nav-label">Images</span>
				</button>

				<button type="button" class="nav-button" data-tab="audio">
					<span class="nav-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M4 10v4h4l5 4V6l-5 4H4z"></path>
							<path d="M16.5 9.5a4 4 0 0 1 0 5"></path>
						</svg>
					</span>
					<span class="nav-label">Audio</span>
				</button>
			</nav>
		</div>

		<div class="main-panel">
			<div class="main-panel-header">
				<button type="button" class="add-image-button">
					<span class="add-image-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M12 16V4"></path>
							<path d="M7 9l5-5 5 5"></path>
							<path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"></path>
						</svg>
					</span>
					<span>Add Image</span>
				</button>

				<button type="button" class="browse-button">Browse</button>
			</div>

			<div class="main-panel-divider"></div>

			<div class="image-grid-scroll">
				<div class="image-grid">
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">

								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M6 6l12 12"></path>
								<path d="M18 6l-12 12"></path>
							</svg>
						</button>
					</div>
				</div>
			</div>
		</div>

	</main>

	<script src="./assets/script/renderer.js"></script>
</body>
</html>
