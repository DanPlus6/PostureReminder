<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="./assets/css/styles.css">
	<link href="https://googleapis.com" rel="stylesheet">
	
	<title>LockIn</title>
</head>
<body>
	<header>
		<img id="logo" src="./assets/img/icon_off.png"/>
		<h1>Lock In</h1>
	</header>

  <main>
		<div class="side-panel">
			<label class="switch">
				<input type="checkbox" id="toggle">
				<span class="switch-slider"></span>
			</label>

			<nav class="nav-list">
				<button type="button" class="nav-button" data-tab="time">
					<img class="nav-icon" src="assets/img/schedule.png">
					<span class="nav-label">Time</span>
				</button>

				<button type="button" class="nav-button active" data-tab="images">
					<img class="nav-icon" src="assets/img/images.png">
					<span class="nav-label">Images</span>
				</button>

				<button type="button" class="nav-button" data-tab="audio">
					<img class="nav-icon" src="assets/img/audio.png">
					<span class="nav-label">Audio</span>
				</button>
			</nav>
		</div>

		<div class="main-panel">
			<div class="main-panel-header">
				<button type="button" class="add-image-button">
					<img class="add-image-icon" src="assets/img/upload.png">
					<span>Add Image</span>
				</button>

				<button type="button" id="browse-button">Browse</button>
			</div>

			<div class="main-panel-divider"></div>

			<div class="image-grid-scroll">
				<div class="image-grid">
					<div class="image-slot">
						<div class="image-slot-frame"></div>
						<button type="button" class="image-slot-remove" aria-label="Remove image">
							<img src="assets/img/remove.png"/>
						</button>
					</div>
					<div class="image-slot">

						</button>
					</div>

						<button type="button" class="image-slot-remove" aria-label="Remove image">

						</button>
					</div>
